<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Upload Dokumen</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 40px;
}
.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
}
button {
  padding: 12px 20px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📎 Upload File DOC</h2>

  <input type="file" id="file" accept=".doc,.docx"><br><br>

  <button onclick="upload()">Upload</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzj1X9vgy2pAkmyz8TW02VIAQx_eeL4yu976LXeDnolYJEs9DsoGeENpxu6OtfDmvxc/exec";

async function upload() {
  const fileInput = document.getElementById("file");

  if (fileInput.files.length === 0) {
    alert("Pilih file dulu!");
    return;
  }

  const file = fileInput.files[0];

  if (!file.name.endsWith(".doc") && !file.name.endsWith(".docx")) {
    alert("Hanya file DOC/DOCX!");
    return;
  }

  const base64 = await toBase64(file);

  const payload = {
    key: "admin123",
    file: base64.split(",")[1],
    fileName: file.name
  };

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (data.success) {
    alert("✅ File berhasil diupload!");
  } else {
    alert("❌ Error: " + JSON.stringify(data));
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}
</script>

</body>
</html>
