<!DOCTYPE html>
<html>
<head>
  <title>Artikel</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background: #f9fafb;
  }

  h1 {
    color: #222;
  }

  .content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }

  a {
    display: inline-block;
    margin-top: 20px;
    color: #2563eb;
  }
</style>
</head>
<body>
  <div id="content"></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycby4bOozGRubfyWgYmkgz8AaK4AA55nOFgsZ9vWWIVichcVz7JylPrmhZhIYAY1De5LM/exec";

    const slug = window.location.pathname.substring(1);

    fetch(`${API}?type=post&slug=${slug}`)
      .then(res => res.json())
      .then(p => {
        document.getElementById("content").innerHTML = `
  <h1>${p.title}</h1>
  <small>${p.date} • ${p.author}</small>
  <div class="content">${p.content}</div>
  <a href="index.html">← Kembali</a>
`;
      });
  </script>
</body>
</html>
