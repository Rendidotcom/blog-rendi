<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <!-- SEO BASIC -->
  <title id="title">Loading...</title>
  <meta name="description" id="desc" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OPEN GRAPH (SHARE WA/FB) -->
  <meta property="og:title" id="ogtitle">
  <meta property="og:description" id="ogdesc">
  <meta property="og:type" content="article">
  <meta property="og:url" id="ogurl">

  <!-- OPTIONAL SEO -->
  <meta name="robots" content="index, follow">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      margin: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      line-height: 1.6;
    }

    .meta {
      color: gray;
      font-size: 14px;
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      color: #2b6cb0;
    }
  </style>
</head>

<body>
<div class="container">
  <div id="post">Loading...</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycby4bOozGRubfyWgYmkgz8AaK4AA55nOFgsZ9vWWIVichcVz7JylPrmhZhIYAY1De5LM/exec";

// ambil slug dari URL
const slug = window.location.pathname.replace("/", "");

fetch(API)
  .then(res => res.json())
  .then(data => {

    const post = data.find(p => p.slug === slug && p.status === "publish");

    if (!post) {
      document.getElementById("post").innerHTML = "<h2>Artikel tidak ditemukan</h2>";
      return;
    }

    // ===== FORMAT DATA =====
    const title = post.title || "Tanpa Judul";
    const content = post.content || "";
    const author = post.author || "Admin";
    const date = new Date(post.date).toLocaleDateString("id-ID");
    const desc = content.replace(/<[^>]*>?/gm, "").substring(0, 150);

    // ===== SEO SETTING =====
    document.getElementById("title").innerText = title + " | Blog Edukasi Holistic";
    document.getElementById("desc").setAttribute("content", desc);

    document.getElementById("ogtitle").setAttribute("content", title);
    document.getElementById("ogdesc").setAttribute("content", desc);
    document.getElementById("ogurl").setAttribute("content", window.location.href);

    // ===== RENDER HTML =====
    document.getElementById("post").innerHTML = `
      <h1>${title}</h1>
      <div class="meta">${date} • ${author}</div>
      <div class="card">${content}</div>
      <br>
      <a href="/">← Kembali ke Beranda</a>
    `;
  })
  .catch(err => {
    document.getElementById("post").innerHTML =
      "<p style='color:red'>Gagal memuat artikel</p>";
  });
</script>

</body>
</html>
