<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    .meta {
      color: gray;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .content {
      line-height: 1.7;
      font-size: 16px;
    }

    a.back {
      display: inline-block;
      margin-bottom: 20px;
      text-decoration: none;
      color: #2b6cb0;
    }

    .error {
      color: red;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

  <a href="/" class="back">← Kembali</a>

  <div id="post" class="card">
    Loading...
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzj1X9vgy2pAkmyz8TW02VIAQx_eeL4yu976LXeDnolYJEs9DsoGeENpxu6OtfDmvxc/exec";

// ambil slug dari URL
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

if (!slug) {
  showError("Slug tidak ditemukan");
} else {
  fetch(API + "?slug=" + slug)
    .then(res => res.json())
    .then(data => {

  // 🔥 HANDLE ARRAY DARI API
  const post = Array.isArray(data) ? data[0] : data;

  if (!post || post.error) {
    showError("Artikel tidak ditemukan");
    return;
  }

  renderPost(post);
})
    .catch(() => {
      showError("Gagal mengambil data");
    });
}

// ================= RENDER =================
function renderPost(post) {
  const title = post.title || "Tanpa Judul";
  const date = formatDate(post.date);
  const author = post.author || "-";
  const content = post.content || "<p>Tidak ada konten</p>";

  document.title = title;

  document.getElementById("post").innerHTML = `
    <h1>${title}</h1>
    <div class="meta">${date} • ${author}</div>
    <div class="content">${content}</div>
  `;
}

// ================= ERROR =================
function showError(msg) {
  document.getElementById("post").innerHTML =
    `<p class="error">${msg}</p>`;
}

// ================= DATE FORMAT =================
function formatDate(d) {
  if (!d) return "-";

  const date = new Date(d);
  if (isNaN(date)) return "-";

  return date.toLocaleDateString("id-ID", {
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}
</script>

</body>
</html>
