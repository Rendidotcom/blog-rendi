<!DOCTYPE html>
<html>
<head>
  <title>Admin - Tulis Artikel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      padding: 12px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    #msg {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>✍️ Tulis Artikel</h1>

<input id="title" placeholder="Judul artikel..." />

<textarea id="content" rows="12" placeholder="Isi artikel... (boleh HTML juga)"></textarea>

<button onclick="submitPost()">Publish</button>

<p id="msg"></p>
const pass = prompt("Password Admin:");

if (pass !== "admin123") {
  document.body.innerHTML = "<h2>Akses ditolak</h2>";
}
<script>
const API = "https://script.google.com/macros/s/AKfycby4bOozGRubfyWgYmkgz8AaK4AA55nOFgsZ9vWWIVichcVz7JylPrmhZhIYAY1De5LM/exec";

function submitPost() {
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const msg = document.getElementById("msg");

  if (!title || !content) {
    msg.innerText = "Judul dan isi wajib diisi!";
    return;
  }

  msg.innerText = "Mengirim...";

  fetch(API, {
  method: "POST",
  body: JSON.stringify({
    title: title,
    content: content,
    key: "admin123"
  })
})
  .then(res => res.json())
  .then(res => {
    if (res.success) {
      msg.innerHTML = "✅ Berhasil masuk ke Drive & blog!<br>Refresh halaman blog.";
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
    } else {
      msg.innerText = "❌ Error: " + (res.error || "gagal");
    }
  })
  .catch(() => {
    msg.innerText = "❌ Gagal koneksi";
  });
}
</script>

</body>
</html>
