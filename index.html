<!DOCTYPE html>
<html>
<head>
  <title>Blog Edukasi Rendi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: #f9fafb;
    }

    h1 {
      text-align: center;
      color: #222;
    }

    .post {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    a {
      text-decoration: none;
      color: #2563eb;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Blog Edukasi Rendi</h1>
  <div id="posts"></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycby4bOozGRubfyWgYmkgz8AaK4AA55nOFgsZ9vWWIVichcVz7JylPrmhZhIYAY1De5LM/exec";

    fetch(API + "?type=posts")
      .then(res => res.json())
      .then(data => {
        let html = "";
        data.forEach(p => {
          html += `
  <div class="post">
    <h2>
      <a href="post.html?slug=${p.slug}">
        ${p.title}
      </a>
    </h2>
    <small>${p.date} • ${p.author}</small>
  </div>
`;
        });
        document.getElementById("posts").innerHTML = html;
      });
  </script>
</body>
</html>
