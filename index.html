<!DOCTYPE html>
<html lang="id">
<head>
  <div style="margin-bottom:20px;">
  <a href="/admin.html" style="
    padding:10px 15px;
    background:#000;
    color:#fff;
    text-decoration:none;
    border-radius:5px;
  ">
    + Tulis Artikel
  </a>
</div>
  <meta charset="UTF-8">
  <title>Blog Edukasi Holistic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    #search {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 20px 0;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    a {
      text-decoration: none;
      color: #2b6cb0;
      font-size: 20px;
      font-weight: bold;
    }

    .meta {
      color: gray;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <main class="container">

    <h1>Blog Edukasi Holistic</h1>
    <input type="text" id="search" placeholder="Cari artikel..." />

    <div id="posts">Loading...</div>

  </main>

<script>
const API = "https://script.google.com/macros/s/AKfycbzj1X9vgy2pAkmyz8TW02VIAQx_eeL4yu976LXeDnolYJEs9DsoGeENpxu6OtfDmvxc/exec";

let allPosts = [];

fetch(API)
  .then(res => res.json())
  .then(data => {
    allPosts = data
      .filter(p => p.status === "publish")
      .sort((a,b) => new Date(b.date) - new Date(a.date));

    render(allPosts);
  })
  .catch(() => {
    document.getElementById("posts").innerHTML =
      "<p style='color:red'>Gagal memuat data</p>";
  });

function render(data) {
  let html = "";

  if (data.length === 0) {
    html = "<p>Tidak ada artikel</p>";
  } else {
    data.forEach(post => {
      html += `
        <div class="card">
          <a href="post.html?slug=${post.slug}">${post.title}</a>
          <div class="meta">
            ${new Date(post.date).toLocaleDateString("id-ID")} • ${post.author}
          </div>
        </div>
      `;
    });
  }

  document.getElementById("posts").innerHTML = html;
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();

  const filtered = allPosts.filter(p =>
    (p.title || "").toLowerCase().includes(keyword) ||
    (p.content || "").toLowerCase().includes(keyword)
  );

  render(filtered);
});
</script>

</body>
</html>
