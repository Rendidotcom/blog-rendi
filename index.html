<!DOCTYPE html>
<html>
<head>
  <title>Blog Rendi</title>
</head>
<body>
  <h1>Blog Edukasi Rendi</h1>
  <div id="posts"></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycby4bOozGRubfyWgYmkgz8AaK4AA55nOFgsZ9vWWIVichcVz7JylPrmhZhIYAY1De5LM/exec";

    fetch(API + "?type=posts")
      .then(res => res.json())
      .then(data => {
        let html = "";
        data.forEach(p => {
          html += `
            <h2>
              <a href="post.html?slug=${p.slug}">
                ${p.title}
              </a>
            </h2>
          `;
        });
        document.getElementById("posts").innerHTML = html;
      });
  </script>
</body>
</html>
