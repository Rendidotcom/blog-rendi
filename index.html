<!DOCTYPE html>
<html>
<head>
  <title>Blog Edukasi Rendi</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 40px;
    }
    .container {
      max-width: 800px;
      margin: auto;
    }
    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    a {
      text-decoration: none;
      color: #2b6cb0;
      font-size: 20px;
      font-weight: bold;
    }
    .meta {
      color: gray;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Blog Edukasi Rendi</h1>
    <div id="posts"></div>
  </div>

<script>
const API = "https://script.google.com/macros/s/AKfycby4bOozGRubfyWgYmkgz8AaK4AA55nOFgsZ9vWWIVichcVz7JylPrmhZhIYAY1De5LM/exec";

fetch(API)
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(post => {
      html += `
        <div class="card">
          <a href="/${post.slug}">${post.title}</a>
          <div class="meta">${post.date} • ${post.author}</div>
        </div>
      `;
    });
    document.getElementById("posts").innerHTML = html;
  });
</script>

</body>
</html>
