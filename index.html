<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Blog Edukasi Holistic</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    #search {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    a {
      text-decoration: none;
      color: #2b6cb0;
      font-size: 20px;
      font-weight: bold;
    }

    .meta {
      color: gray;
      font-size: 14px;
      margin-top: 5px;
    }

    #pagination {
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 6px 10px;
      margin: 3px;
      border-radius: 6px;
      border: 1px solid #ccc;
      cursor: pointer;
    }

    button.active {
      font-weight: bold;
      background: #2b6cb0;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Blog Edukasi Holistic</h1>
    <input type="text" id="search" placeholder="Cari artikel..." />

    <div id="posts">Loading...</div>
    <div id="pagination"></div>

  </div>

<script>
const API = "https://script.google.com/macros/s/AKfycby4bOozGRubfyWgYmkgz8AaK4AA55nOFgsZ9vWWIVichcVz7JylPrmhZhIYAY1De5LM/exec";

let allPosts = [];
let currentPage = 1;
const perPage = 5;

fetch(API)
  .then(res => res.json())
  .then(data => {
    allPosts = data
      .filter(p => p.status === "publish")
      .sort((a,b) => new Date(b.date) - new Date(a.date));

    render(allPosts);
  })
  .catch(() => {
    document.getElementById("posts").innerHTML =
      "<p style='color:red'>Gagal memuat data</p>";
  });

function render(data) {
  let html = "";

  // 🔥 pagination slicing
  const start = (currentPage - 1) * perPage;
  const end = start + perPage;
  const paginated = data.slice(start, end);

  if (paginated.length === 0) {
    html = "<p>Tidak ada artikel ditemukan</p>";
  } else {
    paginated.forEach(post => {
      html += `
        <div class="card">
          <a href="/${post.slug}">${post.title}</a>
          <div class="meta">
            ${new Date(post.date).toLocaleDateString("id-ID")} • ${post.author}
          </div>
        </div>
      `;
    });
  }

  document.getElementById("posts").innerHTML = html;

  renderPagination(data.length);
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / perPage);
  let html = "";

  for (let i = 1; i <= totalPages; i++) {
    html += `
      <button 
        class="${i === currentPage ? 'active' : ''}"
        onclick="goPage(${i})">
        ${i}
      </button>
    `;
  }

  document.getElementById("pagination").innerHTML = html;
}

function goPage(page) {
  currentPage = page;
  render(allPosts);
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();
  currentPage = 1;

  const filtered = allPosts.filter(p =>
    (p.title || "").toLowerCase().includes(keyword) ||
    (p.content || "").toLowerCase().includes(keyword)
  );

  render(filtered);
});
</script>

</body>
</html>
