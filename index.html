<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Blog Edukasi Holistic</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    #search {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    a {
      text-decoration: none;
      color: #2b6cb0;
      font-size: 20px;
      font-weight: bold;
    }

    .meta {
      color: gray;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Blog Edukasi Holistic</h1>
    <input type="text" id="search" placeholder="Cari artikel..." />

    <div id="posts"></div>

  </div>

<script>
const API = "https://script.google.com/macros/s/AKfycby4bOozGRubfyWgYmkgz8AaK4AA55nOFgsZ9vWWIVichcVz7JylPrmhZhIYAY1De5LM/exec";

let allPosts = [];
let currentPage = 1;
const perPage = 5;
  
document.getElementById("posts").innerHTML = "Loading...";

fetch(API)
  .then(res => res.json())
  .then(data => {
    allPosts = data
      .filter(p => p.status === "publish")
      .sort((a,b) => new Date(b.date) - new Date(a.date));

    render(allPosts);
    document.getElementById("posts").innerHTML = "Gagal memuat data";
  });

function render(data) {
  const start = (currentPage - 1) * perPage;
  const end = start + perPage;
  const paginated = data.slice(start, end);

  let html = "";

  paginated.forEach(post => {
    html += `
      <div class="card">
        <a href="/${post.slug || "#"}">${post.title || "Tanpa Judul"}</a>
        <div class="meta">
          ${(post.date || "-")} • ${(post.author || "Anonim")}
        </div>
      </div>
    `;
  });

  html += renderPagination(data.length);

  document.getElementById("posts").innerHTML = html;
}
  function renderPagination(total) {
  const totalPages = Math.ceil(total / perPage);
  let html = "<div style='margin-top:20px;'>";

  for (let i = 1; i <= totalPages; i++) {
    html += `
      <button onclick="goPage(${i})" style="margin:5px;">
        ${i}
      </button>
    `;
  }

  html += "</div>";
  return html;
}

function goPage(page) {
  currentPage = page;
  render(allPosts);
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();
  currentPage = 1;

  const filtered = allPosts.filter(p =>
  (p.title || "").toLowerCase().includes(keyword) ||
  (p.content || "").toLowerCase().includes(keyword)
);
  
  render(filtered);
});
</script>

</body>
</html>
