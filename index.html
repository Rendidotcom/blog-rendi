<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Blog Edukasi Holistic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .topbar {
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 15px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      margin-right: 10px;
      font-size: 14px;
    }

    #search {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 20px 0;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      color: #2b6cb0;
      text-decoration: none;
    }

    .meta {
      color: gray;
      font-size: 14px;
      margin-top: 5px;
    }

    .delete-btn {
      margin-top: 10px;
      background: red;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .empty {
      text-align: center;
      color: gray;
    }
  </style>
</head>

<body>
  <main class="container">

    <div class="topbar">
      <a href="/admin.html" class="btn">+ Tulis Artikel</a>
      <a href="/upload.html" class="btn">📎 Upload Dokumen</a>
    </div>

    <h1>Blog Edukasi Holistic</h1>

    <input type="text" id="search" placeholder="Cari artikel..." />

    <div id="posts">Loading...</div>

  </main>

<script>
const API = "https://script.google.com/macros/s/AKfycbzj1X9vgy2pAkmyz8TW02VIAQx_eeL4yu976LXeDnolYJEs9DsoGeENpxu6OtfDmvxc/exec";

// 🔐 MODE ADMIN (ubah ke false kalau public)
const isAdmin = true;

let allPosts = [];

// ================= LOAD DATA =================
fetch(API)
  .then(res => res.json())
  .then(data => {

    if (!Array.isArray(data)) {
      throw new Error("Format data salah");
    }

    allPosts = data
      .filter(p => p && p.status === "publish" && p.title)
      .sort((a,b) => new Date(b.date) - new Date(a.date));

    render(allPosts);
  })
  .catch(() => {
    document.getElementById("posts").innerHTML =
      "<p class='empty'>❌ Gagal memuat data</p>";
  });

// ================= RENDER =================
function render(data) {
  let html = "";

  if (!data || data.length === 0) {
    html = "<p class='empty'>Tidak ada artikel</p>";
  } else {
    data.forEach(post => {

      const title = post.title || "Tanpa Judul";
      const slug = post.slug || "#";
      const date = formatDate(post.date);
      const author = post.author || "-";

      html += `
        <div class="card">
          <a class="title" href="post.html?slug=${slug}">
            ${title}
          </a>

          <div class="meta">
            ${date} • ${author}
          </div>

          ${isAdmin ? `
            <button class="delete-btn" onclick="deletePost('${slug}')">
              Hapus
            </button>
          ` : ""}
        </div>
      `;
    });
  }

  document.getElementById("posts").innerHTML = html;
}

// ================= DELETE =================
async function deletePost(slug) {
  const confirmDelete = confirm("Yakin ingin menghapus artikel ini?");
  if (!confirmDelete) return;

  try {
    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        key: "admin123",
        action: "delete",
        slug: slug
      })
    });

    const data = await res.json();

    if (data.success) {
      alert("✅ Artikel berhasil dihapus");
      location.reload();
    } else {
      alert("❌ Error: " + JSON.stringify(data));
    }

  } catch (err) {
    alert("❌ Gagal koneksi ke server");
  }
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();

  const filtered = allPosts.filter(p =>
    (p.title || "").toLowerCase().includes(keyword) ||
    (p.content || "").toLowerCase().includes(keyword)
  );

  render(filtered);
});

// ================= DATE FORMAT =================
function formatDate(d) {
  if (!d) return "-";

  const date = new Date(d);
  if (isNaN(date)) return "-";

  return date.toLocaleDateString("id-ID", {
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}
</script>

</body>
</html>
